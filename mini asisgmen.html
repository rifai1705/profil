<!DOCTYPE html>
<html>
<head>
    <title>Mini WebGIS</title>
    <style>
        #map {
            width: 100%;
            height: 400px;
            background: linear-gradient(lightblue, lightgreen);
            position: relative;
            border: 1px solid black;
        }

        .marker {
            width: 12px;
            height: 12px;
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h3>Mini WebGIS</h3>

<!-- pilihan warna -->
<label>Pilih warna: </label>
<select id="warna">
    <option value="red">Merah</option>
    <option value="blue">Biru</option>
    <option value="green">Hijau</option>
</select>

<br><br>

<button id="btnAdd">Add Marker</button>
<button id="btnClear">Clear All</button>
<button id="btnToggle">Toggle Layer</button>

<div id="map"></div>

<script>

let map = document.getElementById("map");
let markers = [];
let tampil = true;

// class marker
class Marker {
    constructor(x, y, warna) {
        this.el = document.createElement("div");
        this.el.className = "marker";

        this.el.style.left = x + "px";
        this.el.style.top = y + "px";
        this.el.style.background = warna;

        this.el.onclick = () => {
            alert("Marker warna: " + warna);
        };
    }

    addTo(peta) {
        peta.appendChild(this.el);
    }

    hapus() {
        this.el.remove();
    }
}

// tambah marker
document.getElementById("btnAdd").onclick = function() {

    // ambil warna dari dropdown
    let pilih = document.getElementById("warna").value;

    let x = Math.random()*380;
    let y = Math.random()*380;

    let m = new Marker(x, y, pilih);
    m.addTo(map);

    markers.push(m);
}

// hapus semua marker
document.getElementById("btnClear").onclick = function() {

    for (let i = 0; i < markers.length; i++) {
        markers[i].hapus();
    }

    markers = [];
}

// toggle layer
document.getElementById("btnToggle").onclick = function() {

    tampil = !tampil;

    for (let i = 0; i < markers.length; i++) {
        if (tampil) {
            markers[i].el.style.display = "block";
        } else {
            markers[i].el.style.display = "none";
        }
    }
}

</script>

</body>
</html>
